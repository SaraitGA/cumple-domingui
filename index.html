<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Domingui❤️</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff3c4);
    overflow:hidden;
}

.pantalla{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    height:100vh;
    padding:10px;
    box-sizing:border-box;
}

h1,h2{
    color:#ff4d88;
    margin:8px;
}

p{
    font-size:17px;
    line-height:1.4;
    max-width:600px;
    margin:10px;
}

button{
    margin-top:15px;
    padding:10px 28px;
    border:none;
    border-radius:12px;
    background:#ff4d88;
    color:white;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.contenedorFotos{
    display:flex;
    justify-content:center;
    gap:15px;
}

img{
    width:160px;
    height:160px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.25);
    display:none;
}


.confeti{
    position:absolute;
    width:8px;
    height:8px;
    animation:caer 4s linear infinite;
}

@keyframes caer{
    from{
        transform:translateY(-20px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}


.corazon{
    position:absolute;
    font-size:25px;
    animation:subir 5s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

</style>

</head>

<body>


<div class="pantalla">



<h1 id="titulo">🎉 ¡Hola Domingui! ❤️</h1>

<h2>🎂 ¡Felices 23 vueltas al sol! 🎈</h2>
<p id="texto">

Hoy no quería felicitarte de una forma cualquiera...
<br><br>
Preparé una pequeña sorpresa solamente para ti. 🥹❤️

</p>


<div class="contenedorFotos">

<img id="foto" src="foto1.jpeg">

<img id="foto2" src="foto4.jpeg">

</div>


<button id="boton" onclick="siguiente()">
Comenzar ✨
</button>


</div>



<script>


// Confeti

for(let i=0;i<100;i++){

let c=document.createElement("div");

c.className="confeti";

c.style.left=Math.random()*100+"vw";

c.style.background=["#ff4d88","#ffd700","#00c3ff","#7CFC00","#ff9800"][Math.floor(Math.random()*5)];

c.style.animationDelay=Math.random()*4+"s";

document.body.appendChild(c);

}



let pagina=1;



function siguiente(){


let titulo=document.getElementById("titulo");

let texto=document.getElementById("texto");

let foto=document.getElementById("foto");

let foto2=document.getElementById("foto2");

let boton=document.getElementById("boton");



if(pagina===1){


titulo.innerHTML="🥰 Gracias por existir";


texto.innerHTML=`

Desde que llegaste a mi vida has hecho mis días mucho más bonitos.

<br><br>

Gracias por cada risa, cada abrazo y cada momento que compartimos.

<br><br>

Hoy solo quiero que seas muy feliz porque te lo mereces muchísimo. ❤️

`;



foto.style.display="block";

foto2.style.display="block";


boton.innerHTML="Siguiente ➜";


pagina=2;



}else{


titulo.innerHTML="❤️ 23 años ❤️";


texto.innerHTML=`

<h2>8401 días</h2>

✨ Miles de sonrisas.

<br><br>

💖 Muchísimos momentos hermosos.

<br><br>

❤️ Y apenas comienza la aventura.

`;



foto.style.display="none";

foto2.style.display="none";


boton.style.display="none";



// Corazones

for(let i=0;i<120;i++){


let h=document.createElement("div");


h.className="corazon";


h.innerHTML="❤️";


h.style.left=Math.random()*100+"vw";


h.style.animationDelay=Math.random()*5+"s";


document.body.appendChild(h);


}


}


}



</script>


</body>
</html>
